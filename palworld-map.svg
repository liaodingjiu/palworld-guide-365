<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1200 -700 1900 2400" class="palworld-map">
  <defs>
    <!-- Water gradient -->
    <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8e1d4"/>
      <stop offset="100%" stop-color="#a8c8b8"/>
    </linearGradient>
    <!-- Land gradient -->
    <linearGradient id="landGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#8db86a"/>
      <stop offset="100%" stop-color="#6d9a4a"/>
    </linearGradient>
    <!-- Dark mode land -->
    <linearGradient id="landGradDark" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#4a6a30"/>
      <stop offset="100%" stop-color="#3a5a24"/>
    </linearGradient>
    <!-- Marker dots -->
    <radialGradient id="markerRed">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </radialGradient>
    <radialGradient id="markerBlue">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#2266cc"/>
    </radialGradient>
    <radialGradient id="markerGold">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#cc9922"/>
    </radialGradient>
  </defs>

  <!-- Background (water) -->
  <rect width="1900" height="2400" x="-1200" y="-700" fill="url(#waterGrad)" />

  <!-- Grid lines (subtle) -->
  <g stroke="#9aba98" stroke-width="0.5" opacity="0.3">
    <line x1="-1200" y1="-600" x2="700" y2="-600"/>
    <line x1="-1200" y1="-400" x2="700" y2="-400"/>
    <line x1="-1200" y1="-200" x2="700" y2="-200"/>
    <line x1="-1200" y1="0" x2="700" y2="0"/>
    <line x1="-1200" y1="200" x2="700" y2="200"/>
    <line x1="-1200" y1="400" x2="700" y2="400"/>
    <line x1="-1200" y1="600" x2="700" y2="600"/>
    <line x1="-1200" y1="800" x2="700" y2="800"/>
    <line x1="-1200" y1="1000" x2="700" y2="1000"/>
    <line x1="-1200" y1="1200" x2="700" y2="1200"/>
    <line x1="-1200" y1="1400" x2="700" y2="1400"/>
    <line x1="-1000" y1="-700" x2="-1000" y2="1700"/>
    <line x1="-800" y1="-700" x2="-800" y2="1700"/>
    <line x1="-600" y1="-700" x2="-600" y2="1700"/>
    <line x1="-400" y1="-700" x2="-400" y2="1700"/>
    <line x1="-200" y1="-700" x2="-200" y2="1700"/>
    <line x1="0" y1="-700" x2="0" y2="1700"/>
    <line x1="200" y1="-700" x2="200" y2="1700"/>
    <line x1="400" y1="-700" x2="400" y2="1700"/>
    <line x1="600" y1="-700" x2="600" y2="1700"/>
  </g>

  <!-- == Main Island (central) == -->
  <!-- The Palpagos Islands - stylized shape -->
  <g class="landmass">
    <!-- Main island body -->
    <path d="
      M -380,-320 
      C -350,-340 -280,-300 -200,-280
      C -120,-260 -50,-240 50,-220
      C 150,-200 250,-180 320,-160
      C 380,-140 420,-100 450,-60
      C 480,-20 480,40 460,80
      C 440,120 400,150 350,170
      C 300,190 240,200 180,210
      C 120,220 60,230 0,240
      C -60,250 -120,260 -180,280
      C -240,300 -280,340 -300,380
      C -320,420 -310,480 -280,520
      C -250,560 -200,580 -140,590
      C -80,600 -20,580 40,560
      C 100,540 150,510 200,470
      C 250,430 290,380 320,330
      C 350,280 370,230 380,190
      C 390,150 390,120 380,90
      C 450,100 500,130 530,170
      C 560,210 570,260 560,310
      C 550,360 520,400 480,420
      C 440,440 390,440 350,420
      C 310,400 280,370 260,340
      C 240,310 230,280 230,260
      C 230,240 240,230 260,230
      C 280,230 310,250 340,280
      C 370,310 400,350 420,400
      C 440,450 440,500 420,540
      C 400,580 360,600 310,600
      C 260,600 210,580 170,550
      C 130,520 100,480 80,440
      C 60,400 50,360 60,320
      C 70,280 100,250 140,230
      C 80,200 20,180 -40,190
      C -100,200 -150,230 -190,270
      C -230,310 -250,360 -250,410
      C -250,460 -230,500 -200,530
      C -170,560 -130,570 -90,570
      C -50,570 -10,550 20,520
      C 50,490 70,450 80,400
      C 90,350 90,300 80,260
      C 70,220 50,190 20,170
      C -10,150 -50,140 -90,140
      C -130,140 -170,150 -200,180
      C -230,210 -250,250 -260,290
      C -270,330 -270,370 -260,400
      C -250,430 -230,460 -200,480
      C -170,500 -140,510 -110,510
      C -80,510 -50,500 -30,480
      C -10,460 0,430 -10,400
      C -20,370 -40,350 -70,340
      C -100,330 -130,340 -150,360
      C -170,380 -180,410 -180,440
      C -180,470 -170,500 -150,520
      C -130,540 -100,550 -70,540
      C -40,530 -20,510 -10,480
      C 0,450 -10,420 -30,400
      C -50,380 -80,370 -110,380
      C -140,390 -160,410 -170,440
      C -180,470 -170,500 -150,510
      C -130,520 -110,520 -100,510
      C -90,500 -90,490 -100,480
      C -110,470 -120,470 -130,480
    " fill="url(#landGrad)" class="land-fill"/>

    <!-- Ice Wind Island (north) -->
    <path d="
      M -160,-520 
      C -140,-540 -100,-550 -60,-540
      C -20,-530 10,-500 30,-460
      C 50,-420 50,-380 30,-350
      C 10,-320 -20,-310 -60,-310
      C -100,-310 -140,-320 -170,-350
      C -200,-380 -210,-420 -200,-460
      C -190,-500 -180,-510 -160,-520
    " fill="#c8d4c0" class="land-fill"/>

    <!-- Dessicated Desert (northeast) -->
    <path d="
      M 300,-80 
      C 340,-100 400,-90 450,-60
      C 500,-30 530,20 540,70
      C 550,120 540,160 510,190
      C 480,220 440,230 400,220
      C 360,210 330,180 310,140
      C 290,100 290,50 300,-80
    " fill="#d4c8a0" class="land-fill"/>

    <!-- Mount Obsidian / Volcano (west) -->
    <path d="
      M -500,200 
      C -530,180 -570,200 -600,230
      C -630,260 -650,300 -640,350
      C -630,400 -600,430 -560,440
      C -520,450 -480,440 -460,410
      C -440,380 -430,340 -440,300
      C -450,260 -470,230 -500,200
    " fill="#c8a080" class="land-fill"/>

    <!-- Feybreak Island (southwest, large) -->
    <path d="
      M -900,800
      C -850,780 -800,770 -750,780
      C -700,790 -660,820 -630,870
      C -600,920 -590,980 -600,1040
      C -610,1100 -640,1140 -680,1160
      C -720,1180 -770,1170 -810,1140
      C -850,1110 -870,1060 -880,1000
      C -890,940 -890,880 -900,800
      M -780,850
      C -750,850 -720,870 -700,910
      C -680,950 -680,1000 -700,1040
      C -720,1080 -750,1100 -780,1100
      C -810,1100 -830,1080 -840,1040
      C -850,1000 -840,950 -820,910
      C -800,870 -790,850 -780,850
    " fill="url(#landGrad)" class="land-fill"/>

    <!-- Small islands/archipelago (southeast) -->
    <path d="
      M 400,700 C 420,690 450,690 470,710 C 490,730 490,760 470,780 C 450,800 420,800 400,780 C 380,760 380,730 400,700
    " fill="url(#landGrad)" class="land-fill"/>
    <path d="
      M 350,900 C 370,880 400,880 420,900 C 440,920 440,950 420,970 C 400,990 370,990 350,970 C 330,950 330,920 350,900
    " fill="url(#landGrad)" class="land-fill"/>

    <!-- Forgotten Island area -->
    <path d="
      M 50,-140 C 70,-150 100,-150 120,-130 C 140,-110 140,-80 120,-60 C 100,-40 70,-40 50,-60 C 30,-80 30,-110 50,-140
    " fill="url(#landGrad)" class="land-fill"/>
  </g>

  <!-- North indicator -->
  <g transform="translate(-1050, -620)">
    <polygon points="0,-18 -10,0 10,0" fill="#444" class="north-arrow"/>
    <text x="0" y="8" text-anchor="middle" font-size="11" fill="#444" font-weight="700" class="north-text">N</text>
  </g>

  <!-- Legend placeholder -->
  <g class="map-legend" transform="translate(-1150, 1500)">
    <rect x="0" y="0" width="260" height="120" rx="6" fill="white" fill-opacity="0.85" stroke="#ccc" stroke-width="1"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Legend</text>
  </g>
</svg>
