<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">Palworld Decision Engine — Site Architecture</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#64748b">palworldguides.com  ·  July 2026</text>

  <!-- ====== Layer 1: Data Sources ====== -->
  <text x="40" y="100" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">DATA LAYER</text>

  <!-- Game -->
  <rect x="40" y="112" width="180" height="44" rx="8" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="130" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#bfdbfe">game.json</text>
  <text x="130" y="146" text-anchor="middle" font-size="10" fill="#93c5fd">Palworld v1.0  ·  locale: en/zh</text>

  <!-- Pals -->
  <rect x="250" y="112" width="180" height="44" rx="8" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="340" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">data/pals/*.json</text>
  <text x="340" y="146" text-anchor="middle" font-size="10" fill="#6ee7b7">200 Pal entities (MVP: 4 built)</text>

  <!-- Decisions -->
  <rect x="460" y="112" width="180" height="44" rx="8" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="550" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">data/decisions/*.json</text>
  <text x="550" y="146" text-anchor="middle" font-size="10" fill="#fcd34d">6 decision scenarios (MVP: 1 built)</text>

  <!-- Manual Pages -->
  <rect x="670" y="112" width="190" height="44" rx="8" fill="#e2e8f0" filter="url(#shadow)"/>
  <text x="765" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">manual-pages.json</text>
  <text x="765" y="146" text-anchor="middle" font-size="10" fill="#64748b">16 hand-written pages</text>

  <!-- Arrows: Data → Build -->
  <line x1="130" y1="156" x2="130" y2="195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="340" y1="156" x2="340" y2="195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="550" y1="156" x2="550" y2="195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="765" y1="156" x2="765" y2="195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- ====== Layer 2: Build Pipeline ====== -->
  <text x="40" y="188" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">BUILD PIPELINE</text>

  <rect x="150" y="195" width="600" height="50" rx="10" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="450" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">scripts/build.js</text>
  <text x="450" y="235" text-anchor="middle" font-size="11" fill="#c4b5fd">loadJSON → renderPalEntityPage / renderDecisionPage → write HTML → sitemap merge</text>

  <!-- Config badge -->
  <rect x="780" y="200" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="830" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">config.</text>
  <text x="830" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">palworld.js</text>

  <!-- Arrow: Build → Pages -->
  <line x1="450" y1="245" x2="450" y2="285" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="445,282 450,295 455,282" fill="#94a3b8"/>

  <!-- ====== Layer 3: Generated Pages ====== -->
  <text x="40" y="280" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">DEPLOYMENT  ·  Cloudflare Pages</text>

  <!-- Entity Pages -->
  <rect x="30" y="295" width="260" height="85" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">/pal/{slug}/  × 4</text>
  <text x="44" y="340" font-size="10" fill="#64748b">anubis  ·  jetragon</text>
  <text x="44" y="355" font-size="10" fill="#64748b">foxparks  ·  lamball</text>
  <text x="44" y="372" font-size="10" fill="#94a3b8">→ 200 planned (Phase 1)</text>

  <!-- Decision Pages -->
  <rect x="310" y="295" width="260" height="85" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">/best-pals/{scenario}/  × 1</text>
  <text x="324" y="340" font-size="10" fill="#64748b">mining</text>
  <text x="324" y="355" font-size="10" fill="#64748b">Ranked Top 20 · Scoring · Reasons</text>
  <text x="324" y="372" font-size="10" fill="#94a3b8">→ 6 planned (Phase 1)</text>

  <!-- Manual Pages -->
  <rect x="590" y="295" width="280" height="85" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Hand-Written  × 16</text>
  <text x="604" y="340" font-size="10" fill="#64748b">index  ·  best-pals  ·  best-weapons</text>
  <text x="604" y="355" font-size="10" fill="#64748b">breeding-guide  ·  server-setup</text>
  <text x="604" y="372" font-size="10" fill="#64748b">tower-bosses  ·  8 more</text>

  <!-- ====== Bottom: Infrastructure ====== -->
  <line x1="40" y1="405" x2="860" y2="405" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="430" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">INFRASTRUCTURE</text>

  <!-- Infrastructure items -->
  <rect x="30" y="445" width="125" height="36" rx="6" fill="#f1f5f9"/>
  <text x="92" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">🔵 favicon.svg</text>
  <text x="92" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">Pal Sphere + P</text>

  <rect x="170" y="445" width="125" height="36" rx="6" fill="#f1f5f9"/>
  <text x="232" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">📊 GA4</text>
  <text x="232" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">G-8T3TKL3W4T</text>

  <rect x="310" y="445" width="125" height="36" rx="6" fill="#f1f5f9"/>
  <text x="372" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">🎥 Clarity</text>
  <text x="372" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">Session recording</text>

  <rect x="450" y="445" width="125" height="36" rx="6" fill="#f1f5f9"/>
  <text x="512" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">🗺️ Sitemap</text>
  <text x="512" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">21 URLs</text>

  <rect x="590" y="445" width="125" height="36" rx="6" fill="#f1f5f9"/>
  <text x="652" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">💅 shared.css</text>
  <text x="652" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">Dark mode</text>

  <rect x="730" y="445" width="140" height="36" rx="6" fill="#f1f5f9"/>
  <text x="800" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">🔒 SSL Always On</text>
  <text x="800" y="474" text-anchor="middle" font-size="9" fill="#94a3b8">HTTPS enforced</text>

  <!-- ====== Bottom: Decision Engine Positioning ====== -->
  <rect x="150" y="510" width="600" height="55" rx="10" fill="#1e293b"/>
  <text x="450" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">Not a Palworld Wiki — a Palworld Decision Engine</text>
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">"The first site players open when they face any choice in Palworld."</text>

  <!-- ====== CSS & Shared Layer ====== -->
  <text x="40" y="500" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">SHARED</text>

  <rect x="30" y="510" width="100" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="532" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">generated-</text>
  <text x="80" y="548" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">components.css</text>

  <!-- Expanders -->
  <text x="450" y="600" text-anchor="middle" font-size="11" fill="#cbd5e1">Phase 1 → +200 Pals  ·  +6 Decisions  ·  Pal Finder  ·  Breeding Calculator</text>
</svg>
